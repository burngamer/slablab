{% extends 'base.html' %}
{% block title %}{{ action }} Category — Slab Lab Admin{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4 p-md-5">
                <h3 class="mb-4">{{ action }} Category</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-accent">{{ action }} Category</button>
                        <a href="{% url 'admin_category_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
