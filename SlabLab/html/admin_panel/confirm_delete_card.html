{% extends 'base.html' %}
{% block title %}Delete Card — Slab Lab Admin{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 text-center">
                <i class="bi bi-exclamation-triangle display-4 text-danger"></i>
                <h3 class="mt-3">Delete Card?</h3>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ card.title }}"</strong>?</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center mt-4">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
                        <a href="{% url 'admin_card_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
